<section class="ExercisesSection">
  <div class="Container">
    <div class="ExercisesHeader">
      <h2 class="ExercisesTitle">
        Exercises <span class="BreadcrumbDivider" style="display: none">/</span>
        <span class="BreadcrumbCurrent"></span>
      </h2>

      <div class="ExercisesControls">
        <form class="ExercisesSearch IsHidden" id="search-form">
          <input
            type="text"
            name="keyword"
            placeholder="Search"
            autocomplete="off"
            class="SearchInput"
          />
          <button type="submit" class="SearchBtn">
            <svg class="SearchIcon" width="18" height="18">
              <use href="/images/icons.svg#search"></use>
            </svg>
          </button>
        </form>

        <div class="FiltersNav">
          <button class="FilterBtn Active" type="button" data-filter="Muscles">
            Muscles
          </button>
          <button class="FilterBtn" type="button" data-filter="Body parts">
            Body parts
          </button>
          <button class="FilterBtn" type="button" data-filter="Equipment">
            Equipment
          </button>
        </div>
      </div>
    </div>

    <div class="ExerciseBox">
      <div>
        <ul class="ExercisesList"></ul>
        <div id="pagination" class="PaginationContainer"></div>
      </div>
      <load src="../../src/partials/quote.html" />
    </div>
  </div>
</section>

<div class="ModalBackdrop IsHidden" id="exercise-modal"></div>
